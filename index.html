<!DOCTYPE html>
<html>
<head>
    <title>TTRPG World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <button id="menu-toggle" class="menu-toggle" aria-label="Open menu">☰</button>
        <div id="menu-panel" class="menu-panel hidden">
            <div class="menu-panel-header">Menu</div>
            <div id="login-form" class="menu-panel-section">
                <label for="login-username">Username</label>
                <input id="login-username" type="text" placeholder="Username">
                <label for="login-password">Password</label>
                <input id="login-password" type="password" placeholder="Password">
                <button id="login-btn">Login</button>
            </div>
            <div id="logout-section" class="menu-panel-section hidden">
                <button id="logout-btn">Logout</button>
            </div>
        </div>
        <div id="admin-controls" class="admin-panel hidden">
            <div class="admin-panel-row">
                <label for="marker-name">Name</label>
                <input id="marker-name" type="text" placeholder="Marker name">
            </div>
            <div class="admin-panel-row">
                <label for="marker-desc">Description</label>
                <textarea id="marker-desc" rows="3" placeholder="Marker description"></textarea>
            </div>
            <div class="admin-panel-row">
                <button id="save-marker-btn">Save Marker</button>
                <button id="cancel-marker-btn">Cancel</button>
            </div>
            <div class="admin-panel-row">
                <small>Tip: click the map to add a marker, then edit its details. Drag markers to move them.</small>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
